<!DOCTYPE html>
<html>

<head>

<title>Students List</title>

<style>

body{
background:#f2fff2;
font-family:Arial;
}


.container{

width:85%;
margin:40px auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 5px 20px #ccc;

}


h1{

text-align:center;
color:green;

}


.nav{

text-align:center;
margin-bottom:30px;

}


button{

background:green;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;

}


.delete{

background:red;

}


.edit{

background:green;

}


input{

padding:12px;
width:300px;
border-radius:8px;
border:1px solid #ccc;

}


table{

width:100%;
border-collapse:collapse;
margin-top:30px;

}


th{

background:green;
color:white;
padding:15px;

}


td{

padding:15px;
text-align:center;
border-bottom:1px solid #ddd;

}


a{

text-decoration:none;

}

</style>

</head>


<body>


<div class="container">


<h1>Students List</h1>


<div class="nav">

<a href="/">
<button>Home</button>
</a>


<a href="/add">
<button>Add Student</button>
</a>

</div>



<form>

<input 
type="text" 
name="search" 
placeholder="Search Student Name">


<button>
Search
</button>


</form>



<table>


<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Action</th>

</tr>



{% for student in students %}


<tr>

<td>{{student.id}}</td>

<td>{{student.name}}</td>

<td>{{student.email}}</td>

<td>{{student.course}}</td>


<td>

<a href="/edit/{{student.id}}">
<button class="edit">
Edit
</button>
</a>


<a href="/delete/{{student.id}}">
<button class="delete">
Delete
</button>
</a>


</td>


</tr>


{% endfor %}


</table>


</div>


</body>


</html>
