<!DOCTYPE html>
<html>

<head>

<title>Add Student</title>

<style>

body{

background:#f2fff2;
font-family:Arial;

}


.container{

width:500px;
margin:60px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0px 5px 20px #ccc;
text-align:center;

}


h1{

color:green;

}


input{

width:90%;
padding:15px;
margin:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}


button{

background:green;
color:white;
border:none;
padding:15px 40px;
border-radius:8px;
font-size:18px;
cursor:pointer;

}


button:hover{

background:#006400;

}


a{

text-decoration:none;

}


</style>

</head>


<body>


<div class="container">


<h1>Add Student</h1>


<form method="POST">


<input type="text" name="name" placeholder="Student Name" required>


<input type="email" name="email" placeholder="Email" required>


<input type="text" name="course" placeholder="Course" required>


<br>


<button type="submit">
Save Student
</button>


</form>


<br>


<a href="/">
<button>
Home
</button>
</a>


</div>


</body>


</html>
