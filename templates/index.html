<!DOCTYPE html>
<html>

<head>

<title>Student Management System</title>


<style>

body{

background:#f2fff2;
font-family:Arial;

}


.container{

width:85%;
margin:50px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px #ccc;
text-align:center;

}


h1{

color:green;
font-size:45px;

}


.card{

background:green;
color:white;
width:300px;
margin:40px auto;
padding:30px;
border-radius:20px;
font-size:22px;

}


.number{

font-size:40px;
margin-top:20px;

}


button{

background:green;
color:white;
border:none;
padding:15px 35px;
margin:10px;
border-radius:10px;
font-size:18px;
cursor:pointer;

}


button:hover{

background:#006400;

}


</style>


</head>



<body>


<div class="container">


<h1>
Student Management System
</h1>



<div class="card">

Total Students

<div class="number">

{{total}}

</div>

</div>



<a href="/add">

<button>
Add Student
</button>

</a>



<a href="/students">

<button>
View Students
</button>

</a>



</div>


</body>

</html>
